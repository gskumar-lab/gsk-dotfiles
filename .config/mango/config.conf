
#config sources
source=$HOME/.config/mango/autostart.conf
source=$HOME/.config/mango/lookandfeel.conf
source=$HOME/.config/mango/inputs.conf
source=$HOME/.config/mango/keybinds.conf
source=$HOME/.config/mango/layouts.conf


# Misc
no_border_when_single=1
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=28
drag_tile_to_tile=1

#Xwayland 
xwayland_persistence=0

# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:fade,layer_name:rofi

# tag rule
#tagrule=id:2,layout_name:scroller

#window rules
#windowrule=Parameter:Values,title:Values
#windowrule=Parameter:Values,Parameter:Values,appid:Values,title:Values
windowrule=isfloating:1,title:bluetui-float
windowrule=isfloating:1,title:nmtui-float
windowrule=isfloating:1,appid:pavucontrol
windowrule=isfloating:1,width:1200,height:500,title:todolist
windowrule=isfloating:1,width:1000,height:800,title:auto-cpufreq-stats
windowrule=isfloating:1,title:lenovo-battery-modes
windowrule=isfloating:1,width:1200,height:500,title:habits
windowrule=isfloating:1,width:1200,height:500,title:clipboard



