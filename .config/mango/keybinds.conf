# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER,R,reload_config

#Apps, menu and terminal
bind=SUPER,SPACE,spawn,~/.config/mango/scripts/show-apps-rofi.sh
bind=SUPER+ALT,space,spawn,~/.config/mango/scripts/tool-menu.sh
bind=SUPER,Return,spawn,footclient
bind=SUPER,B,spawn,brave
bind=SUPER+ALT,B,spawn,brave --incognito
bind=SUPER,Z,spawn,zen-browser
bind=SUPER,E,spawn,pcmanfm
bind=SUPER,P,spawn,superproductivity

#Webapps - brave used for apps
#bind=SUPER,C,spawn,brave --app=https://chat.openai.com --class=webapp-chatgpt  --name="ChatGPT"
#bind=SUPER+ALT,G,spawn,brave --app=https://mail.google.com --class=webapp-gmail --name="Gmail"
#bind=SUPER+ALT,K,spawn,brave --app=https://keep.google.com --class=webapp-keep --name="Google Keep"
bind=SUPER,W,spawn,~/.config/mango/scripts/webapps.sh

#Utilities
bind=SUPER+CTRL,B,spawn_shell,~/.config/mango/waybar/run-waybar.sh
bind=CTRL+SHIFT,B,spawn,~/.config/mango/waybar/waybar-theme-toggle.sh
bind=SUPER,delete,spawn_shell,footclient -e btop

#powermenu
bindl=SUPER,L,spawn,swaylock -c 1e1e2e
bindl=SUPER,Escape,spawn_shell,~/.config/mango/scripts/rofi-power.sh

#screenshot
bind=NONE,Print,spawn_shell,grim ~/Pictures/screen-$(date +%s).png && notify-send 'Screenshot saved'
bind=SHIFT,Print,spawn_shell,slurp | grim -g - ~/Pictures/area-$(date +%s).png && notify-send 'Area screenshot saved'

#open clipboard history
#bind=SUPER,V,spawn_shell,cliphist list | rofi -dmenu -i -p "Clip board History"  | cliphist decode | wl-copy
bind=SUPER,V,spawn,footclient --title clipboard -e ~/.config/mango/scripts/clipboard.sh
#clear clipboard history
bind=SUPER+SHIFT,V,spawn_shell,cliphist wipe

#emoji picker
bind=SUPER,period,spawn,rofi -show emoji

bind=SUPER+ALT,T,spawn,footclient --title "todolist" -e ~/.config/mango/scripts/todolist.sh
bind=SUPER+ALT,H,spawn,footclient --title "habits" -e ~/.config/mango/scripts/habits.sh
bind=SUPER+ALT,P,spawn,footclient --title "lenovo-battery-modes" -e ~/.config/mango/scripts/lenovo-battery-modes.sh
#bind=SUPER+ALT,H,spawn,~/scripts/tools-menu.sh

#Controls
#volume
bind=NONE,XF86AudioRaiseVolume,spawn,~/.config/mango/scripts/volume.sh up
bind=NONE,XF86AudioLowerVolume,spawn,~/.config/mango/scripts/volume.sh down
bind=NONE,XF86AudioMute,spawn,~/.config/mango/scripts/volume.sh mute
#brightness
bind=NONE,XF86MonBrightnessUp,spawn,~/.config/mango/scripts/brightness.sh up
bind=NONE,XF86MonBrightnessDown,spawn,~/.config/mango/scripts/brightness.sh down

#Window controls
# exit
bind=SUPER+CTRL,Q,quit
bind=SUPER+SHIFT,Q,killclient
# switch window focus
bind=SUPER,Tab,focusstack,next
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# switch window status
bind=SUPER,G,toggleglobal
bind=ALT,Tab,toggleoverview
bind=SUPER+SHIFT,F,togglefloating
bind=ALT,A,togglemaximizescreen
bind=SUPER,F,togglefullscreen
bind=ALT,F,togglefakefullscreen
bind=SUPER,I,minimized
bind=SUPER+SHIFT,I,restore_minimized
bind=SUPER,O,toggleoverlay
bind=ALT,Z,toggle_scratchpad

# scroller layout
#bind=ALT,e,set_proportion,1.0
#bind=ALT,x,switch_proportion_preset,

# Cycle through layouts
bind=SUPER,N,switch_layout

# Set specific layout
bind=SUPER,T,setlayout,tile
bind=SUPER,S,setlayout,scroller

# tag switch
#bind=CTRL,Left,viewtoleft,0
#bind=CTRL,Left,viewtoleft_have_client,0
#bind=CTRL,Right,viewtoright,0
#bind=CTRL,Right,viewtoright_have_client,0
bind=SUPER+SHIFT+CTRL,Left,tagtoleft,0
bind=SUPER+SHIFT+CTRL,Right,tagtoright,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# tag: move client to the tag and focus it	
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
# bind=Alt,1,tag,1
bind=SUPER+SHIFT,1,tagsilent,1,0
bind=SUPER+SHIFT,2,tagsilent,2,0
bind=SUPER+SHIFT,3,tagsilent,3,0
bind=SUPER+SHIFT,4,tagsilent,4,0
bind=SUPER+SHIFT,5,tagsilent,5,0
bind=SUPER+SHIFT,6,tagsilent,6,0
bind=SUPER+SHIFT,7,tagsilent,7,0
bind=SUPER+SHIFT,8,tagsilent,8,0
bind=SUPER+SHIFT,9,tagsilent,9,0

# monitor switch
#bind=alt+shift,Left,focusmon,left
#bind=alt+shift,Right,focusmon,right
#bind=SUPER+Alt,Left,tagmon,left
#bind=SUPER+Alt,Right,tagmon,right

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

#movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# 3-finger: Workspace navigation
gesturebind=none,left,3,viewtoright_have_client
gesturebind=none,right,3,viewtoleft_have_client
gesturebind=none,up,3,toggleoverview
gesturebind=none,down,3,toggleoverview



bind=SUPER+ALT,R,spawn_shell,obs --startrecording
bind=SUPER+ALT,S,spawn_shell,obs --stoprecording
